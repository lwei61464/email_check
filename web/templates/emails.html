{% extends "base.html" %}
{% block title %}邮件日志 — 邮件分拣系统{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="mb-4">
  <h1 class="section-title">邮件日志</h1>
  <p class="section-subtitle">查询与筛选已处理的邮件记录</p>
</div>

<!-- 筛选栏 -->
<div class="filter-bar mb-3">
  <div class="row g-2 align-items-end">
    <div class="col-sm-3">
      <label>分类</label>
      <select class="form-select form-select-sm" id="filter-category">
        <option value="">全部分类</option>
        <option value="spam">垃圾邮件</option>
        <option value="transactional">事务通知</option>
        <option value="newsletter">订阅资讯</option>
        <option value="normal">普通邮件</option>
        <option value="important">重要邮件</option>
      </select>
    </div>
    <div class="col-sm-3">
      <label>发件人</label>
      <input type="text" class="form-control form-control-sm" id="filter-sender" placeholder="输入地址搜索">
    </div>
    <div class="col-sm-2">
      <label>开始日期</label>
      <input type="date" class="form-control form-control-sm" id="filter-date-from">
    </div>
    <div class="col-sm-2">
      <label>结束日期</label>
      <input type="date" class="form-control form-control-sm" id="filter-date-to">
    </div>
    <div class="col-sm-2">
      <button class="btn-amber btn-sm w-100" onclick="doSearch()">
        <i class="bi bi-search"></i> 查询
      </button>
    </div>
  </div>
</div>

<!-- 邮件列表 -->
<div class="panel-card" style="border-radius:var(--radius-md)">
  <div id="email-loading" class="text-center py-5" style="color:var(--muted);font-size:0.85rem">加载中…</div>
  <div id="email-empty" class="text-center py-5" style="display:none;color:var(--muted);font-size:0.85rem">
    <i class="bi bi-inbox d-block mb-2" style="font-size:1.8rem;opacity:0.4"></i>暂无邮件记录
  </div>
  <table class="table mb-0" id="email-table" style="display:none">
    <thead>
      <tr>
        <th style="width:200px">发件人</th>
        <th>主题</th>
        <th style="width:90px">分类</th>
        <th style="width:90px">置信度</th>
        <th style="width:140px">处理时间</th>
      </tr>
    </thead>
    <tbody id="email-tbody"></tbody>
  </table>
</div>

<!-- 分页 -->
<div class="d-flex justify-content-between align-items-center mt-3" id="pagination-bar" style="display:none!important">
  <span id="page-info" style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-secondary)"></span>
  <div class="pager" id="pagination-ul"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CATEGORY_LABELS = {
  spam: '垃圾邮件', transactional: '事务通知',
  newsletter: '订阅资讯', normal: '普通邮件', important: '重要邮件'
};
const BADGE_CLASS = {
  spam: 'badge-spam', transactional: 'badge-transactional',
  newsletter: 'badge-newsletter', normal: 'badge-normal', important: 'badge-important'
};

let currentPage = 1;
const PAGE_SIZE = 20;

function doSearch() { currentPage = 1; loadEmails(); }

async function loadEmails() {
  document.getElementById('email-loading').style.display = '';
  document.getElementById('email-table').style.display = 'none';
  document.getElementById('email-empty').style.display = 'none';

  const params = new URLSearchParams({ page: currentPage, page_size: PAGE_SIZE });
  const cat    = document.getElementById('filter-category').value;
  const sender = document.getElementById('filter-sender').value.trim();
  const df     = document.getElementById('filter-date-from').value;
  const dt     = document.getElementById('filter-date-to').value;
  if (cat)    params.set('category', cat);
  if (sender) params.set('sender', sender);
  if (df)     params.set('date_from', df);
  if (dt)     params.set('date_to', dt);

  try {
    const res  = await fetch('/api/emails?' + params);
    const json = await res.json();
    document.getElementById('email-loading').style.display = 'none';
    const { items, total, page } = json.data;

    if (!items || items.length === 0) {
      document.getElementById('email-empty').style.display = '';
      document.getElementById('pagination-bar').style.display = 'none';
      return;
    }

    document.getElementById('email-table').style.display = '';
    const tbody = document.getElementById('email-tbody');
    tbody.innerHTML = items.map((r, i) => {
      const pct   = Math.round((r.confidence || 0) * 100);
      const hiCls = pct >= 80 ? 'confidence-fill--high' : '';
      return `
      <tr onclick="toggleDetail(${i})" data-idx="${i}" class="anim-fade-in-up" style="animation-delay:${i * 22}ms">
        <td class="text-truncate" style="max-width:200px;font-size:0.82rem" title="${r.sender}">${r.sender}</td>
        <td class="text-truncate" style="max-width:280px;font-size:0.82rem" title="${r.subject || ''}">${r.subject || '（无主题）'}</td>
        <td><span class="${BADGE_CLASS[r.category] || 'badge-normal'}">${CATEGORY_LABELS[r.category] || r.category}</span></td>
        <td>
          <div class="d-flex align-items-center gap-1">
            <div class="confidence-bar"><div class="confidence-fill ${hiCls}" style="width:${pct}%"></div></div>
            <span style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-secondary);width:28px;text-align:right">${pct}%</span>
          </div>
        </td>
        <td style="font-family:var(--font-mono);font-size:0.76rem;color:var(--text-secondary)">${r.processed_at || ''}</td>
      </tr>
      <tr class="detail-row" id="detail-${i}">
        <td colspan="5" class="detail-content">
          <div class="d-flex gap-4 flex-wrap">
            <span><span class="detail-key">原因</span>${r.reason || '—'}</span>
            <span><span class="detail-key">动作</span><span style="font-family:var(--font-mono);font-size:0.8rem">${r.action_code || '—'}</span></span>
          </div>
        </td>
      </tr>`;
    }).join('');

    // 分页
    const totalPages = Math.ceil(total / PAGE_SIZE);
    document.getElementById('page-info').textContent = `共 ${total} 条 · 第 ${page}/${totalPages} 页`;
    renderPagination(totalPages);
    document.getElementById('pagination-bar').style.display = '';
  } catch (e) {
    document.getElementById('email-loading').style.display = 'none';
    showToast('加载失败：' + e.message, 'error');
  }
}

function toggleDetail(idx) {
  const row = document.getElementById('detail-' + idx);
  row.classList.toggle('show');
}

function renderPagination(totalPages) {
  const container = document.getElementById('pagination-ul');
  const btns = [];
  btns.push(`<button class="pager-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹</button>`);
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
    btns.push(`<button class="pager-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`);
  }
  btns.push(`<button class="pager-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">›</button>`);
  container.innerHTML = btns.join('');
}

function goPage(p) { currentPage = p; loadEmails(); return false; }

document.getElementById('filter-sender').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

loadEmails();
</script>
{% endblock %}
