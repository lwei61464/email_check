{% extends "base.html" %}
{% block title %}仪表盘 — 邮件分拣系统{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="mb-4">
  <h1 class="section-title">仪表盘</h1>
  <p class="section-subtitle">系统运行总览</p>
</div>

<!-- 统计卡片 -->
<div class="row g-3 mb-4">
  <div class="col-6 col-xl-2">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(241,243,245,0.08);color:var(--text-secondary)">
        <i class="bi bi-inbox-fill"></i>
      </div>
      <div class="stat-label">总处理量</div>
      <div class="stat-number" id="stat-total">0</div>
    </div>
  </div>
  <div class="col-6 col-xl-2">
    <div class="stat-card accent-card">
      <div class="stat-icon" style="background:var(--color-accent-subtle);color:var(--color-accent)">
        <i class="bi bi-calendar-check-fill"></i>
      </div>
      <div class="stat-label">今日处理</div>
      <div class="stat-number" id="stat-today">0</div>
    </div>
  </div>
  <div class="col-6 col-xl-2">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(239,68,68,0.12);color:var(--danger)">
        <i class="bi bi-trash3-fill"></i>
      </div>
      <div class="stat-label">垃圾邮件</div>
      <div class="stat-number stat-number--red" id="stat-spam">0</div>
    </div>
  </div>
  <div class="col-6 col-xl-2">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(245,158,11,0.12);color:var(--accent)">
        <i class="bi bi-star-fill"></i>
      </div>
      <div class="stat-label">重要邮件</div>
      <div class="stat-number stat-number--amber" id="stat-important">0</div>
    </div>
  </div>
  <div class="col-6 col-xl-2">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(239,68,68,0.10);color:var(--danger)">
        <i class="bi bi-slash-circle-fill"></i>
      </div>
      <div class="stat-label">黑名单</div>
      <div class="stat-number stat-number--red" id="stat-blacklist">0</div>
    </div>
  </div>
  <div class="col-6 col-xl-2">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(16,185,129,0.10);color:var(--success)">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      <div class="stat-label">白名单</div>
      <div class="stat-number stat-number--green" id="stat-whitelist">0</div>
    </div>
  </div>
</div>

<!-- 图表 + 最近记录 -->
<div class="row g-3 mb-3">
  <!-- 分类分布环形图 -->
  <div class="col-md-5">
    <div class="panel-card h-100 d-flex flex-column">
      <div class="panel-header">分类分布（近 7 天）</div>
      <div class="panel-body text-center flex-grow-1 d-flex flex-column justify-content-center">
        <div style="position:relative;width:80%;max-width:320px;margin:0 auto">
          <canvas id="category-chart"></canvas>
        </div>
        <div id="chart-empty" class="text-center py-3" style="display:none;color:var(--muted);font-size:0.85rem">暂无数据</div>
      </div>
    </div>
  </div>

  <!-- 最近处理记录 -->
  <div class="col-md-7">
    <div class="panel-card h-100">
      <div class="panel-header">最近处理记录</div>
      <div id="recent-loading" class="text-center py-4" style="color:var(--muted);font-size:0.85rem">加载中…</div>
      <table class="table table-sm mb-0" id="recent-table" style="display:none">
        <thead>
          <tr>
            <th>发件人</th>
            <th>分类</th>
            <th style="width:70px">置信度</th>
            <th style="width:100px">时间</th>
          </tr>
        </thead>
        <tbody id="recent-tbody"></tbody>
      </table>
      <div id="recent-empty" class="text-center py-4" style="display:none;color:var(--muted);font-size:0.85rem">暂无记录</div>
    </div>
  </div>
</div>

<!-- 处理性能趋势 + 历史扫描 -->
<div class="row g-3">
  <div class="col-md-9">
    <div class="panel-card">
      <div class="panel-header">处理性能趋势（近 7 天）</div>
      <div class="panel-body">
        <div id="metrics-empty" class="text-center py-4" style="display:none;color:var(--muted);font-size:0.85rem">
          <i class="bi bi-bar-chart d-block mb-2" style="font-size:1.8rem;opacity:0.4"></i>暂无性能数据
        </div>
        <canvas id="metrics-chart" height="80" style="display:none"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="panel-card" style="height:100%">
      <div class="panel-header">历史邮件扫描</div>
      <div class="panel-body">
        <div class="mb-2">
          <label style="font-size:0.78rem;color:var(--text-secondary)">向前扫描天数</label>
          <input type="number" class="form-control form-control-sm mt-1" id="scan-days" value="30" min="1" max="365">
        </div>
        <div class="mb-3 d-flex align-items-center gap-2">
          <input class="form-check-input" type="checkbox" id="scan-dry-run" checked>
          <label class="form-check-label" for="scan-dry-run" style="font-size:0.78rem;color:var(--text-secondary)">
            试运行（仅统计，不处理）
          </label>
        </div>
        <button class="btn-amber btn-sm w-100" id="scan-btn" onclick="startScan()">
          <i class="bi bi-search"></i> 开始扫描
        </button>
        <div id="scan-status" class="mt-2" style="font-size:0.76rem;color:var(--text-secondary);min-height:1.5rem"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CATEGORY_LABELS = {
  spam: '垃圾邮件', transactional: '事务通知',
  newsletter: '订阅资讯', normal: '普通邮件', important: '重要邮件'
};
const CATEGORY_COLORS = {
  spam: '#ef4444', transactional: '#3b82f6',
  newsletter: '#8b5cf6', normal: '#6b7280', important: '#f59e0b'
};
const BADGE_CLASS = {
  spam: 'badge-spam', transactional: 'badge-transactional',
  newsletter: 'badge-newsletter', normal: 'badge-normal', important: 'badge-important'
};

// 主题感知图表颜色
function chartTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  return {
    text:    dark ? '#94a3b8' : '#64748b',
    grid:    dark ? 'rgba(30,36,51,0.8)' : 'rgba(226,232,240,0.8)',
    tooltipBg:    dark ? '#1e293b' : '#ffffff',
    tooltipBorder: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)',
    tooltipTitle: dark ? '#f1f3f5' : '#0f172a',
    tooltipBody:  dark ? '#94a3b8' : '#475569',
  };
}

// 保存图表实例以便重建
let _chartCategory = null;
let _chartMetrics = null;

async function loadStats() {
  try {
    const res  = await fetch('/api/stats');
    const json = await res.json();
    const d    = json.data;
    animateCounter(document.getElementById('stat-total'),     d.total_processed              ?? 0);
    animateCounter(document.getElementById('stat-today'),     d.today_count                  ?? 0);
    animateCounter(document.getElementById('stat-spam'),      d.category_counts?.spam        ?? 0);
    animateCounter(document.getElementById('stat-important'), d.category_counts?.important   ?? 0);
    animateCounter(document.getElementById('stat-blacklist'), d.blacklist_count              ?? 0);
    animateCounter(document.getElementById('stat-whitelist'), d.whitelist_count              ?? 0);
  } catch (_) {}
}

async function loadChart() {
  try {
    const res   = await fetch('/api/emails/trend');
    const json  = await res.json();
    const items = json.data || [];

    const totals = {};
    for (const row of items) {
      totals[row.category] = (totals[row.category] || 0) + row.count;
    }
    const keys = Object.keys(totals);
    if (keys.length === 0) {
      document.getElementById('chart-empty').style.display = '';
      return;
    }

    const t = chartTheme();
    if (_chartCategory) _chartCategory.destroy();
    _chartCategory = new Chart(document.getElementById('category-chart'), {
      type: 'doughnut',
      data: {
        labels: keys.map(k => CATEGORY_LABELS[k] || k),
        datasets: [{
          data: keys.map(k => totals[k]),
          backgroundColor: keys.map(k => CATEGORY_COLORS[k] || '#9ca3af'),
          borderColor: 'transparent',
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        cutout: '65%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 10, padding: 14, font: { size: 11 }, color: t.text }
          },
          tooltip: {
            backgroundColor: t.tooltipBg,
            borderColor: t.tooltipBorder,
            borderWidth: 1,
            titleColor: t.tooltipTitle,
            bodyColor: t.tooltipBody,
            padding: 10,
          }
        }
      }
    });
  } catch (_) {}
}

async function loadRecent() {
  try {
    const res   = await fetch('/api/emails/recent?limit=10');
    const json  = await res.json();
    const items = json.data || [];
    document.getElementById('recent-loading').style.display = 'none';
    if (items.length === 0) {
      document.getElementById('recent-empty').style.display = '';
      return;
    }
    document.getElementById('recent-table').style.display = '';
    const tbody = document.getElementById('recent-tbody');
    tbody.innerHTML = items.map((r, i) => {
      const pct    = Math.round((r.confidence || 0) * 100);
      const hiCls  = pct >= 80 ? 'confidence-fill--high' : '';
      return `<tr class="anim-fade-in-up" style="animation-delay:${i * 28}ms">
        <td class="text-truncate" style="max-width:0" title="${r.sender}">${r.sender}</td>
        <td><span class="${BADGE_CLASS[r.category] || 'badge-normal'}">${CATEGORY_LABELS[r.category] || r.category}</span></td>
        <td>
          <div class="d-flex align-items-center gap-1">
            <div class="confidence-bar"><div class="confidence-fill ${hiCls}" style="width:${pct}%"></div></div>
          </div>
        </td>
        <td style="font-family:var(--font-mono);font-size:0.76rem;color:var(--text-secondary)">${r.processed_at?.slice(5,16) || ''}</td>
      </tr>`;
    }).join('');
  } catch (_) {}
}

async function loadMetrics() {
  try {
    const res   = await fetch('/api/metrics?days=7');
    const json  = await res.json();
    const items = json.data || [];
    if (items.length === 0) {
      document.getElementById('metrics-empty').style.display = '';
      return;
    }
    const canvas = document.getElementById('metrics-chart');
    canvas.style.display = '';
    const labels = items.map(r => r.recorded_at?.slice(5, 16) || '');
    const t = chartTheme();
    if (_chartMetrics) _chartMetrics.destroy();
    _chartMetrics = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '流水线耗时(s)',
            data: items.map(r => r.pipeline_time),
            borderColor: '#f59e0b',
            backgroundColor: 'rgba(245,158,11,0.08)',
            tension: 0.3,
            fill: true,
            pointRadius: 3,
          },
          {
            label: '处理邮件数',
            data: items.map(r => r.email_count),
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            tension: 0.3,
            fill: true,
            pointRadius: 3,
            yAxisID: 'y2',
          },
        ]
      },
      options: {
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { boxWidth: 10, padding: 12, font: { size: 11 }, color: t.text } },
          tooltip: {
            backgroundColor: t.tooltipBg,
            borderColor: t.tooltipBorder,
            borderWidth: 1,
            titleColor: t.tooltipTitle,
            bodyColor: t.tooltipBody,
            padding: 10,
          }
        },
        scales: {
          x: { ticks: { color: t.text, font: { size: 10 } }, grid: { color: t.grid } },
          y: { ticks: { color: t.text, font: { size: 10 } }, grid: { color: t.grid } },
          y2: { position: 'right', ticks: { color: t.text, font: { size: 10 } }, grid: { drawOnChartArea: false } },
        }
      }
    });
  } catch (_) {}
}

let _scanPollTimer = null;

async function startScan() {
  const days_back = parseInt(document.getElementById('scan-days').value) || 30;
  const dry_run   = document.getElementById('scan-dry-run').checked;
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-status').textContent = '提交中…';

  try {
    const res  = await fetch('/api/scan/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ days_back, dry_run })
    });
    const json = await res.json();
    if (json.code !== 0) { showToast(json.message || '启动失败', 'error'); return; }
    const taskId = json.data.task_id;
    showToast(`扫描任务 #${taskId} 已启动`, 'success');
    _pollScan(taskId);
  } catch (e) {
    showToast('请求失败：' + e.message, 'error');
    document.getElementById('scan-btn').disabled = false;
  }
}

async function _pollScan(taskId) {
  clearTimeout(_scanPollTimer);
  try {
    const res  = await fetch(`/api/scan/history/${taskId}`);
    const json = await res.json();
    const t    = json.data;
    const msg  = t.status === 'completed'
      ? `完成：共 ${t.total} 封，处理 ${t.processed} 封`
      : t.status === 'failed'
        ? `失败：${t.error_msg || '未知错误'}`
        : `运行中：${t.processed}/${t.total}`;
    document.getElementById('scan-status').textContent = msg;
    if (t.status === 'running' || t.status === 'pending') {
      _scanPollTimer = setTimeout(() => _pollScan(taskId), 2000);
    } else {
      document.getElementById('scan-btn').disabled = false;
    }
  } catch { document.getElementById('scan-btn').disabled = false; }
}

loadStats();
loadChart();
loadRecent();
loadMetrics();
</script>
{% endblock %}
