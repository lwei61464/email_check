<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}邮件分拣系统{% endblock %}</title>
  <!-- Google Fonts: DM Sans (UI) + DM Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- 自定义样式 -->
  <link href="/static/style.css" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- 侧边栏品牌 -->
  <a href="/" class="sidebar-brand">
    <i class="bi bi-envelope-check-fill brand-icon"></i>
    <span class="brand-text">邮件分拣</span>
    <span class="brand-tag">v2</span>
  </a>

  <!-- 侧边栏导航 -->
  <nav class="sidebar">
    <div class="sidebar-nav-section">导航</div>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">
          <i class="bi bi-speedometer2"></i><span>仪表盘</span>
          <span class="nav-dot"></span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'emails' %}active{% endif %}" href="/emails">
          <i class="bi bi-list-ul"></i><span>邮件日志</span>
          <span class="nav-dot"></span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'blacklist' %}active{% endif %}" href="/blacklist">
          <i class="bi bi-shield-exclamation"></i><span>黑白名单</span>
          <span class="nav-dot"></span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'rules' %}active{% endif %}" href="/rules">
          <i class="bi bi-funnel"></i><span>自定义规则</span>
          <span class="nav-dot"></span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div>Meridian · 邮件分拣系统</div>
    </div>
  </nav>

  <!-- 顶部状态栏 -->
  <div class="topbar">
    <span class="me-auto" style="font-size:0.82rem;color:var(--text-secondary)">{% block topbar_left %}{% endblock %}</span>
    <div class="status-indicator">
      <span class="status-dot"></span>
      <span>最后处理：<span id="last-time-value" style="font-family:var(--font-mono);color:var(--text-primary)">加载中…</span></span>
    </div>
    <!-- 主题切换 -->
    <button class="theme-toggle" id="theme-toggle-btn" title="切换主题" aria-label="切换明暗主题">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </div>

  <!-- 主内容区 -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast 容器 -->
  <div class="toast-container">
    <div id="app-toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex align-items-center">
        <span id="toast-icon" class="ms-3" style="font-size:1rem"></span>
        <div class="toast-body flex-grow-1" id="toast-message"></div>
        <button type="button" class="btn-close me-2" data-bs-dismiss="toast" aria-label="关闭"
                style="filter:var(--close-filter,invert(0.6))"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <script>
    // ===== 主题管理（浅色默认）=====
    (function () {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();

    document.getElementById('theme-toggle-btn').addEventListener('click', function () {
      const html = document.documentElement;
      const cur  = html.getAttribute('data-theme') || 'light';
      const next = cur === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateChartColors(next);
    });

    function updateChartColors(theme) {
      theme = theme || document.documentElement.getAttribute('data-theme') || 'light';
      if (typeof Chart === 'undefined') return;
      const textColor = theme === 'dark' ? '#94a3b8' : '#64748b';
      const gridColor = theme === 'dark' ? 'rgba(30,36,51,0.8)' : 'rgba(226,232,240,0.8)';
      Chart.defaults.color       = textColor;
      Chart.defaults.font.family = "'DM Sans', system-ui, sans-serif";
      Chart.defaults.borderColor = gridColor;
    }

    // ===== Toast 通知 =====
    function showToast(message, type = 'success') {
      const toast = document.getElementById('app-toast');
      const msg   = document.getElementById('toast-message');
      const icon  = document.getElementById('toast-icon');
      toast.classList.remove('toast--success', 'toast--error', 'toast--warning');
      const map = {
        success: ['toast--success', 'bi bi-check-circle-fill', 'var(--success)'],
        error:   ['toast--error',   'bi bi-x-circle-fill',     'var(--danger)'],
        warning: ['toast--warning', 'bi bi-exclamation-triangle-fill', 'var(--warning)'],
      };
      const [cls, iconCls, color] = map[type] || map.success;
      toast.classList.add(cls);
      icon.className   = iconCls;
      icon.style.color = color;
      msg.textContent  = message;
      bootstrap.Toast.getOrCreateInstance(toast, { delay: 3000 }).show();
    }

    // ===== 数字滚动计数 =====
    function animateCounter(el, target, duration = 800) {
      if (!el) return;
      if (target === 0) { el.textContent = 0; return; }
      const start = performance.now();
      function step(now) {
        const p    = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * ease);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ===== 加载最后处理时间 =====
    async function loadLastTime() {
      try {
        const res  = await fetch('/api/stats');
        const json = await res.json();
        const t    = json.data?.last_processed_at;
        document.getElementById('last-time-value').textContent = t || '暂无记录';
      } catch (_) {}
    }
    loadLastTime();

    // ===== Staggered Reveal =====
    document.addEventListener('DOMContentLoaded', function () {
      updateChartColors();
      const cards = document.querySelectorAll('.stat-card, .panel-card');
      cards.forEach(function (card, i) {
        card.classList.add('anim-card');
        card.style.animationDelay = (i * 60) + 'ms';
      });
    });

    // ===== Chart.js 全局配置 =====
    if (typeof Chart !== 'undefined') {
      updateChartColors();
    }
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
